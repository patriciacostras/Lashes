services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lustlashes
      POSTGRES_USER: lustlashes
      POSTGRES_PASSWORD: lustlashes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lustlashes -d lustlashes"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

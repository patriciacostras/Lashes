<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LustLashes Admin Login</title>
    <style>
      body {
        background: linear-gradient(135deg, #130510, #3a1028 55%, #090306);
        color: #fff1f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      form {
        background: rgba(22, 6, 17, 0.96);
        border: 2px solid #ff9bcc;
        border-radius: 8px;
        box-shadow: 10px 10px 0 #c51673;
        display: grid;
        gap: 14px;
        max-width: 380px;
        padding: 24px;
        width: calc(100% - 32px);
      }
      h1 { margin: 0; font-size: 2rem; }
      label { display: grid; gap: 6px; font-weight: 800; }
      input {
        background: #130510;
        border: 2px solid #ff72b6;
        border-radius: 8px;
        color: #fff1f8;
        padding: 12px;
      }
      button {
        background: #ff3193;
        border: 2px solid #fff1f8;
        border-radius: 999px;
        color: white;
        font-weight: 900;
        padding: 12px 16px;
      }
      .error { color: #ff9bcc; font-weight: 800; margin: 0; }
    </style>
  </head>
  <body>
    <form method="post" action="/admin/login">
      <h1>LustLashes Admin</h1>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>
        Username
        <input autocomplete="username" name="username" required>
      </label>
      <label>
        Parola
        <input autocomplete="current-password" name="password" required type="password">
      </label>
      <button type="submit">Intra in admin</button>
    </form>
  </body>
</html>
